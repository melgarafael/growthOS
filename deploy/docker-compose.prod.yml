# GrowthOS Production Docker Compose
# Usage: docker compose -f deploy/docker-compose.prod.yml up -d
#
# Requires: deploy/.env.production (copy from .env.production.example)
# Note: image: keys allow `docker compose pull` from GHCR when available.
#       If images are not in a registry, `docker compose build` works as fallback.

x-defaults: &defaults
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-mcp-defaults: &mcp-defaults
  <<: *defaults
  build:
    context: ..
    dockerfile: Dockerfile
  networks:
    - mcp-internal
  deploy:
    resources:
      limits:
        cpus: "0.50"
        memory: 256M
      reservations:
        memory: 64M

services:
  # ─── Reverse Proxy ──────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: growthos-caddy
    <<: *defaults
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - proxy-net
      - mcp-internal
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2019/config/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      - DOMAIN=${DOMAIN:-localhost}

  # ─── MCP Social Publish ─────────────────────────────────
  mcp-social-publish:
    <<: *mcp-defaults
    container_name: growthos-mcp-publish
    image: ${GHCR_PREFIX:-growthos}/mcp-social-publish:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: Dockerfile
      target: mcp-social-publish
    expose:
      - "8001"
    env_file: .env.production
    networks:
      - mcp-internal
      - social-egress
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─── MCP Social Discover ────────────────────────────────
  mcp-social-discover:
    <<: *mcp-defaults
    container_name: growthos-mcp-discover
    image: ${GHCR_PREFIX:-growthos}/mcp-social-discover:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: Dockerfile
      target: mcp-social-discover
    expose:
      - "8002"
    env_file: .env.production
    networks:
      - mcp-internal
      - social-egress
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─── MCP Obsidian Vault ─────────────────────────────────
  mcp-obsidian-vault:
    <<: *mcp-defaults
    container_name: growthos-mcp-vault
    image: ${GHCR_PREFIX:-growthos}/mcp-obsidian-vault:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: Dockerfile
      target: mcp-obsidian-vault
    expose:
      - "8003"
    env_file: .env.production
    volumes:
      - ${GROWTHOS_VAULT_PATH:-../vault}:/vault:rw
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─── Review Dashboard ──────────────────────────────────
  review-server:
    <<: *defaults
    container_name: growthos-review
    image: ${GHCR_PREFIX:-growthos}/review-server:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile.review
    expose:
      - "5050"
    env_file: .env.production
    volumes:
      - ../design-system:/app/growthOS/design-system:rw
      - ../output:/app/growthOS/output:rw
      - ../voice:/app/growthOS/voice:rw
      - ../assets:/app/growthOS/assets:ro
      - ../scripts:/app/growthOS/scripts:ro
    networks:
      - proxy-net
      - mcp-internal
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5050/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── Instagram Publisher ────────────────────────────────
  ig-publisher:
    <<: *defaults
    container_name: growthos-ig-publisher
    image: ${GHCR_PREFIX:-growthos}/ig-publisher:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile.publisher
    env_file: .env.production
    volumes:
      - publisher-state:/app/state
      - ../output/approved:/app/approved:ro
    networks:
      - social-egress
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1024M
        reservations:
          memory: 512M

  # ─── Ship Queue Orchestrator ────────────────────────────
  ship-queue:
    <<: *defaults
    container_name: growthos-ship-queue
    image: ${GHCR_PREFIX:-growthos}/ship-queue:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile.queue
    env_file: .env.production
    volumes:
      - ../output/approved:/app/approved:rw
    networks:
      - mcp-internal
      - social-egress
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    depends_on:
      ig-publisher:
        condition: service_started

# ─── Networks ─────────────────────────────────────────────
networks:
  proxy-net:
    driver: bridge
    name: growthos-proxy
  mcp-internal:
    driver: bridge
    name: growthos-internal
    internal: true
  social-egress:
    driver: bridge
    name: growthos-egress

# ─── Volumes ─────────────────────────────────────────────
volumes:
  caddy-data:
  caddy-config:
  publisher-state:
