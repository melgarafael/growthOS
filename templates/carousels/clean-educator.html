<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>{{headline}}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-color: #f8f9fa;
      --bg-gradient: none;
      --text-primary: #1a1a2e;
      --text-secondary: #5a5a72;
      --accent-color: #4361ee;
      --font-headline: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --slide-width: 1080px;
      --slide-height: 1350px;
    }

    body {
      width: var(--slide-width);
      height: var(--slide-height);
      overflow: hidden;
      font-family: var(--font-body);
      background: var(--bg-color);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    .slide {
      width: var(--slide-width);
      height: var(--slide-height);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .slide-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 100px 160px;
    }

    /* ── COVER ── */
    .slide-cover .slide-main {
      align-items: center;
      text-align: center;
    }
    .slide-cover .icon {
      font-size: 96px;
      margin-bottom: 40px;
      line-height: 1;
    }
    .slide-cover .headline {
      font-family: var(--font-headline);
      font-size: 72px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.025em;
      color: var(--accent-color);
      max-width: 800px;
    }
    .slide-cover .body {
      font-size: 32px;
      color: var(--text-secondary);
      margin-top: 32px;
      line-height: 1.5;
      max-width: 700px;
    }
    .slide-cover .swipe-hint {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-top: 48px;
      font-size: 24px;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .slide-cover .swipe-hint::after {
      content: "\2192";
      font-size: 28px;
      color: var(--accent-color);
    }

    /* ── CONTENT ── */
    .slide-content .slide-main {
      align-items: flex-start;
    }
    .slide-content .top-section {
      display: flex;
      align-items: flex-start;
      gap: 24px;
      margin-bottom: 28px;
    }
    .slide-content .icon {
      font-size: 64px;
      line-height: 1;
      flex-shrink: 0;
    }
    .slide-content .headline {
      font-family: var(--font-headline);
      font-size: 52px;
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: var(--accent-color);
    }
    .slide-content .body {
      font-size: 28px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 36px;
    }
    .slide-content .bullets {
      list-style: none;
      padding: 0;
      width: 100%;
    }
    .slide-content .bullets li {
      font-size: 28px;
      color: var(--text-primary);
      padding: 20px 24px 20px 28px;
      border-left: 5px solid var(--accent-color);
      background: #ffffff;
      margin-bottom: 16px;
      border-radius: 0 12px 12px 0;
      line-height: 1.45;
      font-weight: 500;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    /* ── Highlight card ── */
    .highlight-card {
      background: #ffffff;
      border-radius: 20px;
      padding: 36px 40px;
      margin-top: 20px;
      width: 100%;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
      border: 1px solid rgba(0, 0, 0, 0.04);
    }
    .highlight-card .body {
      margin-bottom: 0;
      font-size: 28px;
      color: var(--text-primary);
      font-weight: 500;
      line-height: 1.55;
    }

    /* ── CTA ── */
    .slide-cta .slide-main {
      align-items: center;
      text-align: center;
    }
    .slide-cta .icon {
      font-size: 80px;
      margin-bottom: 36px;
      line-height: 1;
    }
    .slide-cta .headline {
      font-family: var(--font-headline);
      font-size: 60px;
      font-weight: 800;
      line-height: 1.12;
      color: var(--accent-color);
      margin-bottom: 24px;
      max-width: 760px;
    }
    .slide-cta .body {
      font-size: 28px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 48px;
      max-width: 640px;
    }
    .slide-cta .cta-button {
      display: inline-block;
      padding: 28px 72px;
      background: var(--accent-color);
      color: #ffffff;
      font-size: 28px;
      font-weight: 700;
      text-decoration: none;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(67, 97, 238, 0.3);
    }
    .slide-cta .cta-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-top: 16px;
    }
    .slide-cta .cta-secondary {
      font-size: 24px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    /* ── PROGRESS BAR (strong, educator-style) ── */
    .progress-area {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0 100px 48px;
    }
    .progress-bar-track {
      width: 100%;
      height: 8px;
      background: #e0e0e0;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--accent-color);
      border-radius: 4px;
      /* width set dynamically, e.g. width: 42.8% for slide 3 of 7 */
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .brand-handle {
      font-size: 22px;
      color: var(--text-secondary);
      font-weight: 600;
    }
    .progress-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .progress-dots {
      display: flex;
      gap: 8px;
    }
    .progress-dots .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #d0d0d0;
    }
    .progress-dots .dot.active {
      background: var(--accent-color);
    }
    .slide-counter {
      font-size: 22px;
      color: var(--text-secondary);
      font-weight: 700;
    }

    /* ── Subtle top accent ── */
    .slide::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: var(--accent-color);
      z-index: 1;
    }
  </style>
</head>
<body>

  <!-- COVER variant -->
  <div class="slide slide-cover">
    <div class="slide-main">
      <div class="icon">{{icon}}</div>
      <h1 class="headline">{{headline}}</h1>
      <p class="body">{{body}}</p>
      <span class="swipe-hint">Swipe to learn</span>
    </div>
    <div class="progress-area">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" style="width: 14%;"></div>
      </div>
      <div class="progress-meta">
        <span class="brand-handle">{{brand_handle}}</span>
        <div class="progress-info">
          <div class="progress-dots">{{progress_dots}}</div>
          <span class="slide-counter">{{slide_number}}/{{total_slides}}</span>
        </div>
      </div>
    </div>
  </div>
