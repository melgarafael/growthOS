<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>{{headline}}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-color: #ffffff;
      --bg-gradient: none;
      --text-primary: #0a0a0a;
      --text-secondary: #6b6b6b;
      --accent-color: #0a0a0a;
      --font-headline: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --slide-width: 1080px;
      --slide-height: 1350px;
    }

    body {
      width: var(--slide-width);
      height: var(--slide-height);
      overflow: hidden;
      font-family: var(--font-body);
      background: var(--bg-color);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .slide {
      width: var(--slide-width);
      height: var(--slide-height);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 100px 120px;
      position: relative;
    }

    /* ── COVER ── */
    .slide-cover {
      justify-content: center;
      text-align: center;
    }
    .slide-cover .icon {
      font-size: 72px;
      margin-bottom: 48px;
      line-height: 1;
    }
    .slide-cover .headline {
      font-family: var(--font-headline);
      font-size: 72px;
      font-weight: 800;
      line-height: 1.08;
      letter-spacing: -0.03em;
      color: var(--text-primary);
      max-width: 840px;
    }
    .slide-cover .body {
      font-size: 32px;
      color: var(--text-secondary);
      margin-top: 36px;
      line-height: 1.5;
      font-weight: 400;
      max-width: 700px;
    }

    /* ── CONTENT ── */
    .slide-content {
      justify-content: center;
      align-items: flex-start;
      text-align: left;
    }
    .slide-content .icon {
      font-size: 56px;
      margin-bottom: 32px;
      line-height: 1;
    }
    .slide-content .headline {
      font-family: var(--font-headline);
      font-size: 56px;
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -0.025em;
      color: var(--text-primary);
      margin-bottom: 32px;
    }
    .slide-content .body {
      font-size: 30px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 40px;
    }
    .slide-content .bullets {
      list-style: none;
      padding: 0;
      width: 100%;
    }
    .slide-content .bullets li {
      font-size: 30px;
      color: var(--text-primary);
      padding: 20px 0;
      border-bottom: 1px solid #e8e8e8;
      line-height: 1.4;
      font-weight: 500;
    }
    .slide-content .bullets li:last-child {
      border-bottom: none;
    }

    /* ── CTA ── */
    .slide-cta {
      justify-content: center;
      text-align: center;
    }
    .slide-cta .headline {
      font-family: var(--font-headline);
      font-size: 64px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: var(--text-primary);
      margin-bottom: 48px;
    }
    .slide-cta .cta-button {
      display: inline-block;
      padding: 28px 72px;
      background: var(--accent-color);
      color: #ffffff;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-decoration: none;
      text-transform: uppercase;
    }

    /* ── BOTTOM BAR ── */
    .bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 40px 120px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .brand-handle {
      font-size: 22px;
      color: var(--text-secondary);
      font-weight: 500;
      letter-spacing: 0.01em;
    }
    .progress {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .progress-dots {
      display: flex;
      gap: 8px;
    }
    .progress-dots .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #d4d4d4;
    }
    .progress-dots .dot.active {
      background: var(--accent-color);
    }
    .slide-counter {
      font-size: 20px;
      color: var(--text-secondary);
      font-weight: 500;
      margin-left: 8px;
    }

    /* ── TOP ACCENT LINE ── */
    .slide::before {
      content: "";
      position: absolute;
      top: 0;
      left: 120px;
      right: 120px;
      height: 4px;
      background: var(--accent-color);
    }
  </style>
</head>
<body>

  <!-- COVER variant -->
  <div class="slide slide-cover">
    <div class="icon">{{icon}}</div>
    <h1 class="headline">{{headline}}</h1>
    <p class="body">{{body}}</p>
    <div class="bottom-bar">
      <span class="brand-handle">{{brand_handle}}</span>
      <div class="progress">
        <div class="progress-dots">{{progress_dots}}</div>
        <span class="slide-counter">{{slide_number}}/{{total_slides}}</span>
      </div>
    </div>
  </div>

</body>
</html>
